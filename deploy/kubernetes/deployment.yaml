apiVersion: apps/v1
kind: Deployment
metadata:
  name: trustlens-gateway
  labels:
    app.kubernetes.io/name: trustlens
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trustlens
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trustlens
        app.kubernetes.io/component: gateway
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: trustlens:1.0.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 7700
          env:
            - name: TRUSTLENS_WORKERS
              value: "2"
            - name: TRUSTLENS_PROD_MODE
              value: "1"
            - name: TRUSTLENS_BEHIND_TLS_PROXY
              value: "1"
            - name: TRUSTLENS_BOOTSTRAP_EMAIL
              valueFrom:
                secretKeyRef:
                  name: trustlens-bootstrap
                  key: email
            - name: TRUSTLENS_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trustlens-bootstrap
                  key: password
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: trustlens-data
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: trustlens-gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: trustlens
    app.kubernetes.io/component: gateway
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: trustlens-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
